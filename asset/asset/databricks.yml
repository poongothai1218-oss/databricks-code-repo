# This is a Databricks asset bundle definition for asset.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: asset
  uuid: b7594618-314a-4129-b988-ecb357622042

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: http://127.0.0.1:7073
    variables:
      catalog: prodcatalog1
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: http://127.0.0.1:7073
      # We explicitly deploy to /Workspace/Users/poongothai1218@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/poongothai1218@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prodcatalog1
      schema: prod
    permissions:
      - user_name: poongothai1218@gmail.com
        level: CAN_MANAGE
